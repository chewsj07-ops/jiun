<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#FBFBFB" />
  
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#A6AAB0" stroke-width="6" />

  <!-- Cloud (Top Right) -->
  <path d="M320,165 c-5,-15 15,-25 30,-10 c10,-20 40,-20 50,0 c20,-5 30,10 20,25 c15,10 10,30 -10,25 c-5,10 -25,15 -35,5 c-10,10 -30,5 -30,-10 c-10,0 -15,-15 -5,-20 c-5,-5 -5,-10 0,-15 z" fill="#A6B0A9"/>
  <path d="M350,155 c10,-5 20,5 15,15 c-5,10 -15,5 -15,-5" fill="none" stroke="#FBFBFB" stroke-width="3" stroke-linecap="round"/>

  <!-- Lotus Flower -->
  <g transform="translate(256, 250) scale(1.3)">
    <!-- Top Drop -->
    <path d="M 0 -85 C 8 -70, 8 -60, 0 -55 C -8 -60, -8 -70, 0 -85 Z" fill="#A5C7B2" />
    
    <!-- Center Petal -->
    <path d="M 0 -45 C 20 -15, 20 20, 0 30 C -20 20, -20 -15, 0 -45 Z" fill="#A5C7B2" />
    
    <!-- Inner Petals -->
    <path d="M 0 -15 C 25 -25, 40 5, 0 30 C 10 10, 10 -5, 0 -15 Z" fill="#A5C7B2" />
    <path d="M 0 -15 C -25 -25, -40 5, 0 30 C -10 10, -10 -5, 0 -15 Z" fill="#A5C7B2" />
    
    <!-- Middle Petals -->
    <path d="M 0 5 C 40 -15, 65 15, 0 30 C 25 15, 25 5, 0 5 Z" fill="#A5C7B2" />
    <path d="M 0 5 C -40 -15, -65 15, 0 30 C -25 15, -25 5, 0 5 Z" fill="#A5C7B2" />
    
    <!-- Outer Petals -->
    <path d="M 0 15 C 60 -5, 90 25, 0 30 C 40 20, 40 15, 0 15 Z" fill="#A5C7B2" />
    <path d="M 0 15 C -60 -5, -90 25, 0 30 C -40 20, -40 15, 0 15 Z" fill="#A5C7B2" />
    
    <!-- Bottom Ripple -->
    <path d="M -60 40 C -30 40, -10 45, 20 45 C 50 45, 70 40, 90 45 C 110 50, 90 65, 60 60 C 30 55, 10 55, -20 50 C -40 45, -60 45, -60 40 Z" fill="#A5C7B2" />
  </g>

  <!-- Text -->
  <text x="256" y="415" font-family="'Kaiti SC', 'STKaiti', 'KaiTi', serif" font-size="56" fill="#888F96" text-anchor="middle" letter-spacing="8">禅心助手</text>
</svg>
